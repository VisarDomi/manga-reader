<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#050505" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Prepend Test" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <title>Prepend Test</title>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <main id="app">
      <section class="toolbar">
        <div>
          <strong>Prepend Test</strong>
          <span id="status">Manga details - reserved space mode</span>
        </div>
        <button id="reset" type="button">Reset</button>
      </section>
      <section id="details" class="details" aria-label="Manga details">
        <div class="cover"></div>
        <div class="meta">
          <h1>Newest Chapter Timing Test</h1>
          <p>This view intentionally has its own scroll position. Scroll here if you want, then tap Chapter 46.</p>
        </div>
        <div id="chapter-list" class="chapter-list"></div>
      </section>
      <section id="reader" class="reader hidden" aria-label="Synthetic reader">
        <div id="chapters"></div>
      </section>
      <section class="log-panel">
        <div class="log-title">Events</div>
        <pre id="log"></pre>
      </section>
    </main>
  </body>
</html>
